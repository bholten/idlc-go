name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.21', '1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  corpus-parity:
    name: corpus lock/dispatch parity (vs JAR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      # The JAR is an unlicensed proprietary blob we keep OUT of this tree
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Fetch Core3 corpus + JAR (transient, gitignored)
        run: git clone --depth 1 --recurse-submodules --shallow-submodules
          https://github.com/SWGEmu/Core3.git submodules/Core3

      - name: Full-corpus lock/dispatch parity
        run: make test-parity
